<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Watch Coverage — Mercy Gilbert WCT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D1117;
      --surface:   #161B22;
      --surface2:  #21262D;
      --border:    #30363D;
      --text:      #E6EDF3;
      --muted:     #8B949E;
      --red:       #F85149;
      --red-dim:   rgba(248,81,73,0.15);
      --green:     #3FB950;
      --green-dim: rgba(63,185,80,0.12);
      --blue:      #58A6FF;
      --blue-dim:  rgba(88,166,255,0.12);
      --accent:    #FF6B35;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .fire-icon {
      font-size: 32px;
      filter: drop-shadow(0 0 8px rgba(255,107,53,0.6));
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    header p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .header-right { text-align: right; }
    .last-updated-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .last-updated-time  { font-size: 13px; color: var(--text); font-weight: 600; margin-top: 2px; }

    .refresh-btn {
      margin-top: 8px;
      padding: 6px 14px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { background: var(--border); border-color: var(--muted); }

    /* ── STAT CARDS ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 30px 8px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--blue);
      border-radius: 12px 12px 0 0;
    }

    .stat-card.open::before    { background: var(--red); }
    .stat-card.percent::before { background: var(--green); }
    .stat-card.filled::before  { background: var(--blue); }

    .stat-card:hover { border-color: var(--muted); }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .stat-number {
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .stat-card.open .stat-number    { color: var(--red); }
    .stat-card.percent .stat-number { color: var(--green); font-size: 32px; }

    /* ── ALERT BANNER ── */
    .alert-banner {
      margin: 16px 30px;
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--red);
      font-weight: 600;
      font-size: 14px;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    .pulse-dot {
      width: 10px; height: 10px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse-dot 1.2s ease infinite;
      flex-shrink: 0;
    }

    /* ── TELEGRAM BANNER ── */
    .telegram-banner {
      margin: 0 30px 16px;
      background: var(--blue-dim);
      border: 1px solid rgba(88,166,255,0.3);
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .telegram-banner a {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }

    .telegram-banner a:hover { text-decoration: underline; }

    /* ── FILTERS ── */
    .filters {
      padding: 0 30px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filters input, .filters select {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .filters input::placeholder { color: var(--muted); }
    .filters input:focus, .filters select:focus { border-color: var(--blue); }
    .filters input { width: 220px; }
    .filters select option { background: var(--surface2); }

    /* ── TABLE ── */
    .table-wrap {
      margin: 0 30px 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { background: var(--surface2); }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody tr.open-row { background: var(--red-dim); }
    tbody tr.open-row:hover { background: rgba(248,81,73,0.2); }

    tbody td {
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
    }

    tbody tr.open-row td { color: var(--red); font-weight: 600; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.open   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,81,73,0.3); }
    .badge.filled { background: var(--green-dim);  color: var(--green); border: 1px solid rgba(63,185,80,0.3); }

    /* ── SIGN UP BUTTON ── */
    .signup-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .signup-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── LOADING / ERROR ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 15px;
    }

    .error-msg {
      margin: 0 30px 20px;
      background: rgba(255,193,7,0.1);
      border: 1px solid rgba(255,193,7,0.4);
      border-radius: 10px;
      padding: 14px 20px;
      color: #FFC107;
      font-size: 14px;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: center; text-align: center; gap: 12px; padding: 16px; }
      .header-right { text-align: center; display: flex; flex-direction: column; align-items: center; }
      .last-updated-label { text-align: center; }
      .last-updated-time  { text-align: center; }
      .summary { grid-template-columns: repeat(2, 1fr); padding: 16px 16px 8px; }
      .table-wrap { margin: 0 16px 24px; }
      .filters { padding: 0 16px 16px; }
      .alert-banner, .telegram-banner { margin: 0 16px 16px; }
      thead th:nth-child(5) { display: none; }
      tbody td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="fire-icon">🔥</span>
    <div>
      <h1>Fire Watch Coverage</h1>
      <p>Mercy Gilbert WCT Project</p>
    </div>
  </div>
  <div class="header-right">
    <div class="last-updated-label">Last Updated</div>
    <div class="last-updated-time" id="lastUpdated">Loading...</div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div class="summary">
  <div class="stat-card">
    <div class="stat-label">Total Shifts</div>
    <div class="stat-number" id="totalCount">—</div>
  </div>
  <div class="stat-card filled">
    <div class="stat-label">Filled</div>
    <div class="stat-number" id="filledCount">—</div>
  </div>
  <div class="stat-card open">
    <div class="stat-label">Open</div>
    <div class="stat-number" id="openCount">—</div>
  </div>
  <div class="stat-card percent">
    <div class="stat-label">Coverage</div>
    <div class="stat-number" id="percentCount">—</div>
  </div>
</div>

<div id="alertBanner" style="display:none" class="alert-banner">
  <div class="pulse-dot"></div>
  <span id="alertText"></span>
</div>

<div id="errorMsg" style="display:none" class="error-msg"></div>

<div class="telegram-banner">
  <span style="font-size:20px;">📲</span>
  <span>Want alerts when shifts open up? <a href="https://t.me/+fPm9B-djtURlMjEx" target="_blank">Join our Telegram group →</a></span>
</div>

<div class="filters">
  <input type="text" id="searchInput" placeholder="Search name, date, block..." oninput="renderTable()">
  <select id="statusFilter" onchange="renderTable()">
    <option value="ALL">All Shifts</option>
    <option value="OPEN">Open Only</option>
    <option value="FILLED">Filled Only</option>
  </select>
</div>

<div id="tableContainer">
  <div class="table-wrap">
    <div class="loading">Loading shift data...</div>
  </div>
</div>

<script>
  var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcnQp8oo56skIT_F1bv003wtLv5nhYVwYmVBcaRXVGKSPQPxNZ0l6QJ4xuzbCXUSLZ-c9cwRXKaPLW/pub?gid=2012597347&single=true&output=csv";

  var allShifts = [];

  function parseCSV(text) {
    var lines  = text.trim().split("\n");
    var shifts = [];
    var today  = new Date();
    today.setHours(0, 0, 0, 0);

    for (var i = 7; i < lines.length; i++) {
      var cols = splitCSVLine(lines[i]);
      if (cols.length < 5) continue;

      var dateVal = cols[0] ? cols[0].trim().replace(/"/g, "") : "";
      var status  = cols[4] ? cols[4].trim().replace(/"/g, "").toUpperCase() : "";

      if (!dateVal || !status) continue;

      var shiftDate = new Date(dateVal);
      if (isNaN(shiftDate) || shiftDate < today) continue;

      var dayStr = "";
      try {
        var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        dayStr = days[shiftDate.getDay()] + ", ";
      } catch(e) {}

      shifts.push({
        date:   dayStr + dateVal,
        block:  cols[1] ? cols[1].trim().replace(/"/g, "") : "",
        name:   cols[2] ? cols[2].trim().replace(/"/g, "") : "",
        phone:  cols[3] ? cols[3].trim().replace(/"/g, "") : "",
        status: status
      });
    }

    return shifts;
  }

  function splitCSVLine(line) {
    var result = [], current = "", inQuotes = false;
    for (var c = 0; c < line.length; c++) {
      var ch = line[c];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { result.push(current); current = ""; }
      else { current += ch; }
    }
    result.push(current);
    return result;
  }

  function loadData() {
    document.getElementById("lastUpdated").textContent = "Refreshing...";
    document.getElementById("errorMsg").style.display = "none";

    var url = CSV_URL + "&t=" + Date.now();

    fetch(url)
      .then(function(res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function(text) {
        allShifts = parseCSV(text);
        updateStats();
        renderTable();
        document.getElementById("lastUpdated").textContent = new Date().toLocaleString("en-US", {
          month: "short", day: "numeric", year: "numeric",
          hour: "numeric", minute: "2-digit"
        });
      })
      .catch(function(err) {
        document.getElementById("lastUpdated").textContent = "Failed to load";
        document.getElementById("errorMsg").style.display = "block";
        document.getElementById("errorMsg").textContent =
          "Could not load shift data. Error: " + err.message;
      });
  }

  function updateStats() {
    var total  = allShifts.length;
    var filled = allShifts.filter(function(s) { return s.status === "FILLED"; }).length;
    var open   = allShifts.filter(function(s) { return s.status === "OPEN"; }).length;
    var pct    = total > 0 ? ((filled / total) * 100).toFixed(1) : "0.0";

    document.getElementById("totalCount").textContent   = total;
    document.getElementById("filledCount").textContent  = filled;
    document.getElementById("openCount").textContent    = open;
    document.getElementById("percentCount").textContent = pct + "%";

    var banner = document.getElementById("alertBanner");
    if (open > 0) {
      banner.style.display = "flex";
      document.getElementById("alertText").textContent =
        open + " shift" + (open > 1 ? "s are" : " is") +
        " currently OPEN and need" + (open === 1 ? "s" : "") + " coverage!";
    } else {
      banner.style.display = "none";
    }
  }

  function renderTable() {
    var search    = document.getElementById("searchInput").value.toLowerCase();
    var filter    = document.getElementById("statusFilter").value;
    var container = document.getElementById("tableContainer");

    var filtered = allShifts.filter(function(s) {
      var matchSearch = (s.date + s.block + s.name + s.phone).toLowerCase().includes(search);
      var matchStatus = filter === "ALL" || s.status === filter;
      return matchSearch && matchStatus;
    });

    if (filtered.length === 0) {
      container.innerHTML = '<div class="table-wrap"><div class="loading">No shifts found.</div></div>';
      return;
    }

    var rows = filtered.map(function(s) {
      var isOpen   = s.status === "OPEN";
      var rowClass = isOpen ? "open-row" : "";
      return '<tr class="' + rowClass + '">' +
        '<td>' + s.date + '</td>' +
        '<td>' + s.block + '</td>' +
        '<td>' + (isOpen
          ? '<a class="signup-btn" href="https://www.signupgenius.com/go/10C054FA9AC23A0F4C43-56532553-wctfire" target="_blank">Sign Up →</a>'
          : s.name) + '</td>' +
        '<td>' + (s.phone || '<span style="color:var(--muted)">—</span>') + '</td>' +
        '<td><span class="badge ' + s.status.toLowerCase() + '">' + s.status + '</span></td>' +
        '</tr>';
    }).join('');

    container.innerHTML =
      '<div class="table-wrap"><table>' +
        '<thead><tr>' +
          '<th>Date</th><th>Block</th><th>Assigned Name</th><th>Phone</th><th>Status</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>';
  }

  loadData();
  setInterval(loadData, 5 * 60 * 1000);
</script>

</body>
</html>
